version: '3.8'

services:
  # MySQL Database (Ana Uygulama — Prisma ORM)
  mysql:
    image: mysql:8.0
    container_name: mrpop_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mrpop_root_pass
      MYSQL_DATABASE: popads
      MYSQL_USER: mrpop
      MYSQL_PASSWORD: mrpop_secure_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mrpop_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── BLOG: WordPress + MySQL ──────────────────────────────────────────────
  # WordPress runs silently in the background.
  # Next.js /blog fetches from its REST API: http://localhost:8080/wp-json/wp/v2/
  # Production: Replace localhost:8080 with your live domain (e.g. blog.mrpop.io)
  # ──────────────────────────────────────────────────────────────────────────
  blog_db:
    image: mysql:8.0
    container_name: mrpop_blog_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: blogroot
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppassword
    ports:
      - "3306:3306"
    volumes:
      - blog_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:latest
    container_name: mrpop_wordpress
    restart: unless-stopped
    depends_on:
      blog_db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: blog_db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
      WORDPRESS_DB_NAME: wordpress
      # Enable JWT Auth plugin support
      WORDPRESS_CONFIG_EXTRA: |
        define('JWT_AUTH_SECRET_KEY', 'mrpop-jwt-secret-change-in-prod');
        define('JWT_AUTH_CORS_ENABLE', true);
    volumes:
      - wordpress_data:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  blog_db_data:
    driver: local
  wordpress_data:
    driver: local
