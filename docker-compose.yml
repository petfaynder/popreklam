services:
  # ─── INFRASTRUCTURE ───────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: mrpop_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mrpop_root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-popads}
      MYSQL_USER: ${MYSQL_USER:-mrpop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mrpop_secure_pass}
    networks:
      - mrpop_internal
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mrpop_redis
    restart: unless-stopped
    networks:
      - mrpop_internal
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MAIL SERVER (Self-hosted Postfix relay) ──────────────────────────────────

  mailserver:
    image: boky/postfix
    container_name: mrpop_mailserver
    restart: unless-stopped
    environment:
      HOSTNAME: ${MAIL_HOSTNAME:-mail.mrpop.io}
      ALLOWED_SENDER_DOMAINS: ${MAIL_SENDER_DOMAIN:-mrpop.io}
      DKIM_ENABLED: "1"
      DKIM_SELECTOR: mail
      POSTFIX_myhostname: ${MAIL_HOSTNAME:-mail.mrpop.io}
    networks:
      - mrpop_internal
    volumes:
      - mailserver_data:/var/spool/postfix
      - dkim_keys:/etc/opendkim/keys
    healthcheck:
      test: ["CMD", "postfix", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── APPLICATION ──────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mrpop_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailserver:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: mysql://${MYSQL_USER:-mrpop}:${MYSQL_PASSWORD:-mrpop_secure_pass}@mysql:3306/${MYSQL_DATABASE:-popads}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_URL: redis://redis:6379
      APP_URL: ${APP_URL:-https://api.mrpop.io}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://mrpop.io}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DODO_API_KEY: ${DODO_API_KEY}
      DODO_WEBHOOK_SECRET: ${DODO_WEBHOOK_SECRET}
      OXAPAY_MERCHANT_API_KEY: ${OXAPAY_MERCHANT_API_KEY}
      VOLET_WALLET_ID: ${VOLET_WALLET_ID}
      SMTP_HOST: mailserver
      SMTP_PORT: "25"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ${SMTP_FROM:-noreply@mrpop.io}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks:
      - mrpop_internal
      - dokploy-network
    volumes:
      - backend_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend-landing
      dockerfile: Dockerfile
    container_name: mrpop_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.mrpop.io}
    networks:
      - mrpop_internal
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── BLOG: WordPress + MySQL ──────────────────────────────────────────────────

  blog_db:
    image: mysql:8.0
    container_name: mrpop_blog_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${BLOG_MYSQL_ROOT_PASSWORD:-blogroot}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: ${BLOG_MYSQL_USER:-wpuser}
      MYSQL_PASSWORD: ${BLOG_MYSQL_PASSWORD:-wppassword}
    networks:
      - mrpop_internal
    volumes:
      - blog_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:latest
    container_name: mrpop_wordpress
    restart: unless-stopped
    depends_on:
      blog_db:
        condition: service_healthy
    networks:
      - mrpop_internal
      - dokploy-network
    environment:
      WORDPRESS_DB_HOST: blog_db:3306
      WORDPRESS_DB_USER: ${BLOG_MYSQL_USER:-wpuser}
      WORDPRESS_DB_PASSWORD: ${BLOG_MYSQL_PASSWORD:-wppassword}
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('JWT_AUTH_SECRET_KEY', '${JWT_SECRET:-change-me-in-production}');
        define('JWT_AUTH_CORS_ENABLE', true);
    volumes:
      - wordpress_data:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mrpop_internal:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  blog_db_data:
    driver: local
  wordpress_data:
    driver: local
  backend_uploads:
    driver: local
  mailserver_data:
    driver: local
  dkim_keys:
    driver: local
